<!--
  ============================================================
  MALEDUCATI FINANZIARI — Header Code Injection
  Dove incollare: Squarespace > Settings > Advanced >
                  Code Injection > HEADER
  ============================================================
-->

<!-- Google Fonts: Antonio (titoli) + DM Sans (body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

<!-- GSAP 3.12.5 + ScrollTrigger -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<!-- Variabili CSS brand in :root -->
<style>
  :root {
    --mf-navy:       #003a64;
    --mf-blue:       #54a2d2;
    --mf-light:      #a9cee8;
    --mf-white:      #ffffff;
    --mf-font-title: 'Antonio', sans-serif;
    --mf-font-body:  'DM Sans', sans-serif;
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {

  /* ============================================================
     1. URGENCY BAR — creata e iniettata in cima al body
     ============================================================ */
  var bar = document.createElement('div');
  bar.id = 'mf-urgency-bar';
  bar.innerHTML =
    '\u23F3 Le iscrizioni chiudono domenica 12 aprile alle 23:59' +
    ' &mdash; <span class="mf-countdown"></span>' +
    ' &mdash; <a href="https://esmerise.com/maleducatifinanziari/register?p=8274" id="mf-urgency-cta">Iscriviti ora &rarr;</a>';
  document.body.insertBefore(bar, document.body.firstChild);

  /* Aggiusta padding-top del body per non nascondere il contenuto */
  function adjustPadding() {
    document.body.style.paddingTop = bar.offsetHeight + 'px';
  }
  adjustPadding();
  window.addEventListener('resize', adjustPadding);


  /* ============================================================
     2. COUNTDOWN TIMER
     Scadenza: domenica 12 aprile 2026 ore 23:59
     ============================================================ */
  function pad(n) {
    return String(n).padStart(2, '0');
  }

  function updateCountdown() {
    var deadline = new Date('2026-04-12T23:59:00');
    var now      = new Date();
    var diff     = deadline - now;

    /* Seleziona tutti gli elementi .mf-countdown nella pagina
       (urgency bar + sezione urgenza finale) */
    var els = document.querySelectorAll('.mf-countdown');

    if (diff <= 0) {
      els.forEach(function (el) {
        el.textContent = 'Le iscrizioni sono chiuse';
        el.classList.add('mf-countdown--expired');
      });
      var cta = document.getElementById('mf-urgency-cta');
      if (cta) { cta.style.display = 'none'; }
      return;
    }

    var days    = Math.floor(diff / (1000 * 60 * 60 * 24));
    var hours   = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    var seconds = Math.floor((diff % (1000 * 60)) / 1000);

    var html =
      '<span class="mf-cd-unit">' + days    + '<small>g</small></span>' +
      '<span class="mf-cd-sep">:</span>' +
      '<span class="mf-cd-unit">' + pad(hours)   + '<small>h</small></span>' +
      '<span class="mf-cd-sep">:</span>' +
      '<span class="mf-cd-unit">' + pad(minutes) + '<small>m</small></span>' +
      '<span class="mf-cd-sep">:</span>' +
      '<span class="mf-cd-unit">' + pad(seconds) + '<small>s</small></span>';

    els.forEach(function (el) { el.innerHTML = html; });
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);


  /* ============================================================
     3. GSAP — Animazioni scroll fade-in dal basso
     Ogni elemento con classe .mf-animate entra nel viewport
     con opacity 0 -> 1 e translateY 30px -> 0
     ============================================================ */
  if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
    gsap.registerPlugin(ScrollTrigger);

    /* Elementi singoli */
    document.querySelectorAll('.mf-animate').forEach(function (el) {
      gsap.fromTo(el,
        { opacity: 0, y: 30 },
        {
          opacity:  1,
          y:        0,
          duration: 0.7,
          ease:     'power2.out',
          scrollTrigger: {
            trigger: el,
            start:   'top 88%',
            once:    true,
            onEnter: function () { el.classList.add('is-visible'); }
          }
        }
      );
    });

    /* Gruppi con stagger (es. card pricing) */
    document.querySelectorAll('.mf-animate-group').forEach(function (group) {
      var children = group.querySelectorAll('.mf-animate-child');
      gsap.fromTo(children,
        { opacity: 0, y: 30 },
        {
          opacity:  1,
          y:        0,
          duration: 0.6,
          ease:     'power2.out',
          stagger:  0.15,
          scrollTrigger: {
            trigger: group,
            start:   'top 88%',
            once:    true
          }
        }
      );
    });
  }

});
</script>
